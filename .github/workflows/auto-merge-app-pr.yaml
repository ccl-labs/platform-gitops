name: Auto Merge App PR
on:
  pull_request:
    types:
      - opened
      - synchronize
    branches:
      - main

jobs:
  auto-merge:
    if: startsWith(github.head_ref, 'app/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: PR を squash merge
        run: gh pr merge "${{ github.event.pull_request.number }}" --squash --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
