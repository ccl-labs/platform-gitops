name: Build & Push
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: GHCR ログイン
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ "${{" }} github.actor ${{ "}}" }}
          password: ${{ "${{" }} secrets.GITHUB_TOKEN ${{ "}}" }}

      - name: GitHub App トークンの生成
        id: token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ "${{" }} vars.GITOPS_APP_CLIENT_ID ${{ "}}" }}
          private-key: ${{ "${{" }} secrets.GITOPS_APP_PRIVATE_KEY ${{ "}}" }}
          owner: okccl

      - name: Docker ビルド & プッシュ
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/okccl/${{ values.appName }}-backend:${{ "${{" }} github.sha ${{ "}}" }}

      - name: platform-gitops に dispatch
        run: |
          gh api repos/okccl/platform-gitops/dispatches \
            --method POST \
            -f event_type=update-image \
            -f "client_payload[image_repository]=ghcr.io/okccl/${{ values.appName }}-backend" \
            -f "client_payload[image_tag]=${{ "${{" }} github.sha ${{ "}}" }}"
        env:
          GH_TOKEN: ${{ "${{" }} steps.token.outputs.token ${{ "}}" }}
