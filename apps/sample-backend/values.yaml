app:
  name: sample-backend
  version: "1.0.0"
image:
  repository: ghcr.io/okccl/sample-backend
  tag: b5a1299
  pullPolicy: IfNotPresent
  pullSecretName: ghcr-pull-secret
replicaCount: 2
containerPort: 8000
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
probes:
  liveness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 10
  readiness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 5
ingress:
  enabled: true
  host: sample-backend.localhost
hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
serviceMonitor:
  enabled: true
  path: /metrics
  interval: 30s
db:
  name: sample-backend-db
  instances: 2
  postgresVersion: 17
  storageSize: 1Gi
  database: app
  owner: app
  backup:
    enabled: true
    endpointURL: "http://host.k3d.internal:9000"
    bucketName: "cnpg-backup"
    secretName: "minio-backup-secret"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
env:
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: "http://tempo.tracing.svc.cluster.local:4318"
  - name: OTEL_SERVICE_NAME
    value: "sample-backend"
