apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: sample-apps
  namespace: argocd
spec:
  sourceRepos:
    - git@github.com:ccl-labs/sample-backend.git
    - git@github.com:ccl-labs/sample-frontend.git
    - git@github.com:ccl-labs/platform-charts.git
    - git@github.com:ccl-labs/platform-gitops.git
  destinations:
    - namespace: sample-app
      server: https://kubernetes.default.svc
  clusterResourceWhitelist: []
