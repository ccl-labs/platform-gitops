apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-backend
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: sample-apps
  sources:
    - repoURL: https://github.com/ccl-labs/platform-charts.git
      targetRevision: main
      path: charts/sample-backend
      helm:
        valueFiles:
          - $values/apps/sample-backend/values.yaml
    - repoURL: https://github.com/ccl-labs/platform-gitops.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/ccl-labs/platform-gitops.git
      targetRevision: main
      path: apps/sample-backend/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: sample-app
  ignoreDifferences:
    - group: argoproj.io
      kind: Rollout
      jsonPointers:
        # KEDA が管理する replicaCount は無視
        - /spec/replicas
        # Helm のデフォルト値として付与される protocol: TCP を無視
        - /spec/template/spec/containers/0/ports/0/protocol
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      jqPathExpressions:
        # Gateway API が parentRefs にデフォルト補完するフィールドを無視
        - .spec.parentRefs[].group
        - .spec.parentRefs[].kind
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        # ESO controller がデフォルト補完するフィールドを無視
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.data[].remoteRef.nullBytePolicy
        - .spec.target.creationPolicy
        - .spec.target.deletionPolicy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      # ignoreDifferences のフィールドを sync 時にも上書きしない
      - RespectIgnoreDifferences=true
