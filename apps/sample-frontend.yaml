apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-frontend
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: sample-apps
  sources:
    - repoURL: git@github.com:okccl/platform-charts.git
      targetRevision: main
      path: charts/sample-frontend
      helm:
        valueFiles:
          - $values/apps/sample-frontend/values.yaml
    - repoURL: git@github.com:okccl/platform-gitops.git
      targetRevision: main
      ref: values
    - repoURL: git@github.com:okccl/platform-gitops.git
      targetRevision: main
      path: apps/sample-frontend/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: sample-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
