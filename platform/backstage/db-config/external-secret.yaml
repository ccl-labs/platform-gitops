apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backstage-db-credentials
  namespace: backstage
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: kubernetes-store
    kind: ClusterSecretStore
  target:
    name: backstage-db-credentials
  data:
    - secretKey: username
      remoteRef:
        key: backstage-db-credentials-source
        property: username
    - secretKey: password
      remoteRef:
        key: backstage-db-credentials-source
        property: password
