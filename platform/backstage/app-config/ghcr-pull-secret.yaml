apiVersion: generators.external-secrets.io/v1alpha1
kind: GithubAccessToken
metadata:
  name: ghcr-token
  namespace: backstage
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  appID: "3623421"
  installID: "131473521"
  auth:
    privateKey:
      secretRef:
        name: backstage-secret
        key: GITHUB_APP_PRIVATE_KEY
  permissions:
    packages: read
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-pull-secret
  namespace: backstage
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 30m
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: GithubAccessToken
          name: ghcr-token
  target:
    name: ghcr-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: '{"auths":{"ghcr.io":{"username":"x-access-token","password":"{{ .token }}"}}}'
