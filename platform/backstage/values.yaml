backstage:
  image:
    registry: ghcr.io
    repository: backstage/backstage
    tag: latest
    pullPolicy: IfNotPresent

  appConfig:
    app:
      title: Platform Backstage
      baseUrl: http://backstage.platform.local

    backend:
      baseUrl: http://backstage.platform.local
      listen:
        port: 7007
        host: 0.0.0.0
      cors:
        origin: http://backstage.platform.local
        methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
        credentials: true
      database:
        client: pg
        connection:
          host: ${POSTGRES_HOST}
          port: ${POSTGRES_PORT}
          user: ${POSTGRES_USER}
          password: ${POSTGRES_PASSWORD}
          database: ${POSTGRES_DB}
          ssl:
            require: true
            rejectUnauthorized: false

  extraEnvVars:
    - name: BACKEND_SECRET
      valueFrom:
        secretKeyRef:
          name: backstage-secret
          key: BACKEND_SECRET
    - name: POSTGRES_HOST
      value: "backstage-db-rw.backstage.svc.cluster.local"
    - name: POSTGRES_PORT
      value: "5432"
    - name: POSTGRES_USER
      valueFrom:
        secretKeyRef:
          name: backstage-db-credentials
          key: username
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: backstage-db-credentials
          key: password
    - name: POSTGRES_DB
      value: "app"

postgresql:
  enabled: false
