backstage:
  image:
    registry: ghcr.io
    repository: ccl-labs/backstage
    tag: latest
    pullPolicy: Always
    pullSecrets:
      - ghcr-pull-secret
  appConfig:
    app:
      title: Platform Backstage
      baseUrl: https://backstage.platform.local
    backend:
      baseUrl: https://backstage.platform.local
      listen:
        port: 7007
        host: 0.0.0.0
      csp:
        upgrade-insecure-requests: false
        connect-src: ["'self'", 'https://api.github.com']
      cors:
        origin: https://backstage.platform.local
        methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
        credentials: true
      database:
        client: pg
        connection:
          host: ${POSTGRES_HOST}
          port: ${POSTGRES_PORT}
          user: ${POSTGRES_USER}
          password: ${POSTGRES_PASSWORD}
          database: ${POSTGRES_DB}
          ssl:
            require: true
            rejectUnauthorized: false
      auth:
        dangerouslyDisableDefaultAuthPolicy: true
        keys:
          - secret: ${BACKEND_SECRET}
    auth:
      session:
        secret: ${BACKEND_SECRET}
      environment: development
      providers:
        guest: {}
        oidc:
          development:
            metadataUrl: https://keycloak.platform.local/auth/realms/platform/.well-known/openid-configuration
            clientId: backstage
            clientSecret: ${KEYCLOAK_CLIENT_SECRET}
            prompt: auto
            signIn:
              resolvers:
                - resolver: emailMatchingUserEntityProfileEmail
        github:
          development:
            clientId: ${GITHUB_OAUTH_CLIENT_ID}
            clientSecret: ${GITHUB_OAUTH_CLIENT_SECRET}
            signIn:
              resolvers:
                - resolver: usernameMatchingUserEntityName
    techdocs:
      builder: 'local'
      generator:
        runIn: 'local'
      publisher:
        type: 'local'
    notifications:
      enabled: false
    proxy:
      endpoints:
        '/argocd':
          target: https://argocd.platform.local
          changeOrigin: true
          secure: false
          headers:
            Authorization: Bearer ${ARGOCD_TOKEN}
    integrations:
      github:
        - host: github.com
          apps:
            - appId: ${GITHUB_APP_ID}
              clientId: ${GITHUB_APP_CLIENT_ID}
              clientSecret: ${GITHUB_APP_CLIENT_SECRET}
              privateKey: ${GITHUB_APP_PRIVATE_KEY}
    catalog:
      locations:
        - type: url
          target: https://github.com/ccl-labs/platform-gitops/blob/main/backstage/templates/vcluster/template.yaml
          rules:
            - allow: [Template]
        - type: url
          target: https://github.com/ccl-labs/platform-gitops/blob/main/backstage/templates/fullstack/template.yaml
          rules:
            - allow: [Template]
        - type: url
          target: https://github.com/ccl-labs/platform-gitops/blob/main/catalog-info.yaml
          rules:
            - allow: [System, Component]
        - type: url
          target: https://github.com/ccl-labs/platform-gitops/blob/main/backstage/org.yaml
          rules:
            - allow: [User, Group]
        - type: url
          target: https://github.com/ccl-labs/sample-backend/blob/main/catalog-info.yaml
          rules:
            - allow: [Component]
        - type: url
          target: https://github.com/ccl-labs/sample-frontend/blob/main/catalog-info.yaml
          rules:
            - allow: [Component]
        - type: url
          target: https://github.com/ccl-labs/platform-infra/blob/main/catalog-info.yaml
          rules:
            - allow: [Component]
        - type: url
          target: https://github.com/ccl-labs/platform-charts/blob/main/catalog-info.yaml
          rules:
            - allow: [Component]
        - type: url
          target: https://github.com/ccl-labs/platform-docs/blob/main/catalog-info.yaml
          rules:
            - allow: [Component]
        - type: url
          target: https://github.com/ccl-labs/platform-gitops/blob/main/backstage/catalog/platform-components.yaml
          rules:
            - allow: [Component]
  extraEnvVars:
    - name: NODE_TLS_REJECT_UNAUTHORIZED
      value: "0"
    - name: BACKEND_SECRET
      valueFrom:
        secretKeyRef:
          name: backstage-secret
          key: BACKEND_SECRET
    - name: KEYCLOAK_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: backstage-secret
          key: KEYCLOAK_CLIENT_SECRET
    - name: GITHUB_APP_ID
      valueFrom:
        secretKeyRef:
          name: backstage-secret
          key: GITHUB_APP_ID
    - name: GITHUB_APP_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: backstage-secret
          key: GITHUB_APP_CLIENT_ID
    - name: GITHUB_APP_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: backstage-secret
          key: GITHUB_APP_CLIENT_SECRET
    - name: GITHUB_APP_PRIVATE_KEY
      valueFrom:
        secretKeyRef:
          name: backstage-secret
          key: GITHUB_APP_PRIVATE_KEY
    - name: GITHUB_OAUTH_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: backstage-secret
          key: GITHUB_OAUTH_CLIENT_ID
    - name: GITHUB_OAUTH_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: backstage-secret
          key: GITHUB_OAUTH_CLIENT_SECRET
    - name: ARGOCD_TOKEN
      valueFrom:
        secretKeyRef:
          name: backstage-secret
          key: ARGOCD_TOKEN
    - name: POSTGRES_HOST
      value: "backstage-db-rw.backstage.svc.cluster.local"
    - name: POSTGRES_PORT
      value: "5432"
    - name: POSTGRES_USER
      valueFrom:
        secretKeyRef:
          name: backstage-db-credentials
          key: username
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: backstage-db-credentials
          key: password
    - name: POSTGRES_DB
      value: "app"
postgresql:
  enabled: false
