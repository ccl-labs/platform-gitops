backstage:
  image:
    registry: ghcr.io
    repository: okccl/backstage
    tag: latest
    pullPolicy: Always
    pullSecrets:
      - ghcr-pull-secret
  appConfig:
    app:
      title: Platform Backstage
      baseUrl: https://backstage.platform.local
    backend:
      baseUrl: https://backstage.platform.local
      listen:
        port: 7007
        host: 0.0.0.0
      csp:
        upgrade-insecure-requests: false
      cors:
        origin: https://backstage.platform.local
        methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
        credentials: true
      database:
        client: pg
        connection:
          host: ${POSTGRES_HOST}
          port: ${POSTGRES_PORT}
          user: ${POSTGRES_USER}
          password: ${POSTGRES_PASSWORD}
          database: ${POSTGRES_DB}
          ssl:
            require: true
            rejectUnauthorized: false
      auth:
        dangerouslyDisableDefaultAuthPolicy: true
    auth:
      environment: development
      providers:
        guest: {}
        oidc:
          development:
            metadataUrl: https://keycloak.platform.local/realms/platform/.well-known/openid-configuration
            clientId: backstage
            clientSecret: ${KEYCLOAK_CLIENT_SECRET}
            prompt: auto
            signIn:
              resolvers:
                - resolver: emailMatchingUserEntityProfileEmail
    notifications:
      enabled: false
    integrations:
      github:
        - host: github.com
          token: ${GITHUB_TOKEN}
    catalog:
      locations:
        - type: url
          target: https://github.com/okccl/platform-gitops/blob/main/backstage/templates/vcluster/template.yaml
          rules:
            - allow: [Template]
        - type: url
          target: https://github.com/okccl/platform-gitops/blob/main/catalog-info.yaml
          rules:
            - allow: [System, Component]
        - type: url
          target: https://github.com/okccl/sample-backend/blob/main/catalog-info.yaml
          rules:
            - allow: [Component]
        - type: url
          target: https://github.com/okccl/sample-frontend/blob/main/catalog-info.yaml
          rules:
            - allow: [Component]
        - type: url
          target: https://github.com/okccl/platform-infra/blob/main/catalog-info.yaml
          rules:
            - allow: [Component]
        - type: url
          target: https://github.com/okccl/platform-charts/blob/main/catalog-info.yaml
          rules:
            - allow: [Component]
        - type: url
          target: https://github.com/okccl/platform-docs/blob/main/catalog-info.yaml
          rules:
            - allow: [Component]
  extraEnvVars:
    - name: BACKEND_SECRET
      valueFrom:
        secretKeyRef:
          name: backstage-secret
          key: BACKEND_SECRET
    - name: KEYCLOAK_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: backstage-secret
          key: KEYCLOAK_CLIENT_SECRET
    - name: GITHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: backstage-secret
          key: GITHUB_TOKEN
    - name: POSTGRES_HOST
      value: "backstage-db-rw.backstage.svc.cluster.local"
    - name: POSTGRES_PORT
      value: "5432"
    - name: POSTGRES_USER
      valueFrom:
        secretKeyRef:
          name: backstage-db-credentials
          key: username
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: backstage-db-credentials
          key: password
    - name: POSTGRES_DB
      value: "app"
postgresql:
  enabled: false
