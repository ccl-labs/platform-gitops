controlPlane:
  distro:
    k3s:
      enabled: true
  statefulSet:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

sync:
  toHost:
    ingresses:
      enabled: true
    pods:
      rewriteHosts:
        enabled: true

exportKubeConfig:
  secret:
    name: vcluster-dev-kubeconfig

# ホストクラスタへ同期する Pod にデフォルトの resource limits を付与
# Kyverno の require-resource-limits ポリシーを満たすため
plugin:
  limitRange:
    enabled: true

policies:
  limitRange:
    enabled: true
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
