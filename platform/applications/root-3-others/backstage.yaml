apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backstage
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://backstage.github.io/charts
      chart: backstage
      targetRevision: 2.6.3
      helm:
        valueFiles:
          - $values/platform/backstage/values.yaml
    - repoURL: https://github.com/ccl-labs/platform-gitops.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/ccl-labs/platform-gitops.git
      targetRevision: main
      path: platform/backstage/app-config
  destination:
    server: https://kubernetes.default.svc
    namespace: backstage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    managedNamespaceMetadata:
      labels:
        ghcr-pull-secret: enabled
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /spec/data/0/remoteRef/conversionStrategy
        - /spec/data/0/remoteRef/decodingStrategy
        - /spec/data/0/remoteRef/metadataPolicy
        - /spec/data/0/remoteRef/nullBytePolicy
        - /spec/data/1/remoteRef/conversionStrategy
        - /spec/data/1/remoteRef/decodingStrategy
        - /spec/data/1/remoteRef/metadataPolicy
        - /spec/data/1/remoteRef/nullBytePolicy
        - /spec/data/2/remoteRef/conversionStrategy
        - /spec/data/2/remoteRef/decodingStrategy
        - /spec/data/2/remoteRef/metadataPolicy
        - /spec/data/2/remoteRef/nullBytePolicy
        - /spec/data/3/remoteRef/conversionStrategy
        - /spec/data/3/remoteRef/decodingStrategy
        - /spec/data/3/remoteRef/metadataPolicy
        - /spec/data/3/remoteRef/nullBytePolicy
        - /spec/data/4/remoteRef/conversionStrategy
        - /spec/data/4/remoteRef/decodingStrategy
        - /spec/data/4/remoteRef/metadataPolicy
        - /spec/data/4/remoteRef/nullBytePolicy
        - /spec/data/5/remoteRef/conversionStrategy
        - /spec/data/5/remoteRef/decodingStrategy
        - /spec/data/5/remoteRef/metadataPolicy
        - /spec/data/5/remoteRef/nullBytePolicy
        - /spec/data/6/remoteRef/conversionStrategy
        - /spec/data/6/remoteRef/decodingStrategy
        - /spec/data/6/remoteRef/metadataPolicy
        - /spec/data/6/remoteRef/nullBytePolicy
        - /spec/data/7/remoteRef/conversionStrategy
        - /spec/data/7/remoteRef/decodingStrategy
        - /spec/data/7/remoteRef/metadataPolicy
        - /spec/data/7/remoteRef/nullBytePolicy
        - /spec/data/8/remoteRef/conversionStrategy
        - /spec/data/8/remoteRef/decodingStrategy
        - /spec/data/8/remoteRef/metadataPolicy
        - /spec/data/8/remoteRef/nullBytePolicy
