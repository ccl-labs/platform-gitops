apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: user-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/okccl/apps-gitops.git
    targetRevision: main
    path: apps
    directory:
      recurse: true
      include: '*/application.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
