apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  name: kyverno
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kyverno.github.io/kyverno
    chart: kyverno
    targetRevision: 3.7.1
    helm:
      values: |
        admissionController:
          replicas: 1
          rbac:
            clusterRole:
              extraResources:
                - apiGroups:
                    - ""
                  resources:
                    - secrets
                  verbs:
                    - get
                    - list
        backgroundController:
          replicas: 1
          rbac:
            clusterRole:
              extraResources:
                - apiGroups:
                    - ""
                  resources:
                    - secrets
                  verbs:
                    - get
                    - list
                    - watch
                    - create
                    - update
                    - patch
                    - delete
        cleanupController:
          replicas: 1
        reportsController:
          replicas: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  ignoreDifferences:
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
      name: kyverno:migrate-resources
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
      name: kyverno:migrate-resources
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /metadata/labels
        - /metadata/annotations
    - group: batch
      kind: Job
      name: kyverno-migrate-resources
      jsonPointers:
        - /status
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
