configs:
  params:
    server.insecure: "true"
  cm:
    url: "https://argocd.platform.local"
    kustomize.buildOptions: "--enable-alpha-plugins --enable-exec"
    accounts.backstage: apiKey
    oidc.config: |
      name: Keycloak
      issuer: https://keycloak.platform.local/auth/realms/platform
      clientID: argocd
      clientSecret: $argocd-keycloak-secret:clientSecret
      requestedScopes:
        - openid
        - profile
        - email
        - groups
      rootCA: $argocd-local-ca:ca.crt
    resource.customizations.health.external-secrets.io_ClusterSecretStore: |
      hs = {}
      if obj.status ~= nil then
        if obj.status.conditions ~= nil then
          for i, condition in ipairs(obj.status.conditions) do
            if condition.type == "Ready" and condition.status == "False" then
              hs.status = "Degraded"
              hs.message = condition.message
              return hs
            end
            if condition.type == "Ready" and condition.status == "True" then
              hs.status = "Healthy"
              hs.message = condition.message
              return hs
            end
          end
        end
      end
      hs.status = "Progressing"
      hs.message = "Waiting for ClusterSecretStore to be ready"
      return hs
    resource.customizations.health.external-secrets.io_ExternalSecret: |
      hs = {}
      if obj.status ~= nil then
        if obj.status.conditions ~= nil then
          for i, condition in ipairs(obj.status.conditions) do
            if condition.type == "Ready" and condition.status == "False" then
              hs.status = "Degraded"
              hs.message = condition.message
              return hs
            end
            if condition.type == "Ready" and condition.status == "True" then
              hs.status = "Healthy"
              hs.message = condition.message
              return hs
            end
          end
        end
      end
      hs.status = "Progressing"
      hs.message = "Waiting for ExternalSecret to be ready"
      return hs
  rbac:
    policy.csv: |
      p, role:platform-team, applications, *, */*, allow
      p, role:platform-team, repositories, *, *, allow
      p, role:app-developer, applications, get, sample-apps/*, allow
      p, role:backstage-reader, applications, get, */*, allow
      g, platform-team, role:platform-team
      g, app-developer, role:app-developer
      g, backstage, role:backstage-reader
    policy.default: role:''
    scopes: "[groups]"
ingress:
  enabled: false
repoServer:
  env:
    - name: XDG_CONFIG_HOME
      value: /.config
    - name: SOPS_AGE_KEY_FILE
      value: /.config/sops/age/keys.txt
  volumes:
    - name: custom-tools
      emptyDir: {}
    - name: sops-age
      secret:
        secretName: sops-age
  initContainers:
    - name: install-ksops
      image: viaductoss/ksops:v4.3.3
      command: ["/bin/sh", "-c"]
      args: ["cp /usr/local/bin/ksops /custom-tools/"]
      volumeMounts:
        - name: custom-tools
          mountPath: /custom-tools
  volumeMounts:
    - name: custom-tools
      mountPath: /.config/kustomize/plugin/viaduct.ai/v1/ksops/ksops
      subPath: ksops
    - name: sops-age
      mountPath: /.config/sops/age
      readOnly: true
