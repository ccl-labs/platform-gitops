apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:okccl/platform-gitops.git
    targetRevision: HEAD
    path: platform
    directory:
      recurse: true
      exclude: "{crossplane/config/*,policy/policies/*,ingress/config/*,secrets/config/*,gateway/config/*,gateway/envoy-gateway-crds/*,gateway/envoy-gateway/*,keycloak/db-config/*,keycloak/app-config/*,backstage/db-config/*,backstage/app-config/*,vcluster/*}"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
