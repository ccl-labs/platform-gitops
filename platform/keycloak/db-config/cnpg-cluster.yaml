apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: keycloak-db
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17
  bootstrap:
    initdb:
      database: keycloak
      owner: keycloak
      secret:
        name: keycloak-db-credentials
  storage:
    size: 2Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  backup:
    barmanObjectStore:
      endpointURL: "http://host.k3d.internal:9000"
      destinationPath: "s3://cnpg-backup/keycloak-db"
      s3Credentials:
        accessKeyId:
          name: minio-backup-secret
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: minio-backup-secret
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "7d"
