# Cilium は bootstrap 時に Helm で直接インストール済み。
# ArgoCD はその後の設定変更・アップグレードを GitOps で管理する。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://helm.cilium.io
    chart: cilium
    targetRevision: 1.19.3
    helm:
      values: |
        kubeProxyReplacement: true
        k8sServiceHost: 0.0.0.0
        k8sServicePort: 6443
        hostServices:
          enabled: false
        externalIPs:
          enabled: true
        nodePort:
          enabled: true
        hostPort:
          enabled: true
        bpf:
          masquerade: false
        image:
          pullPolicy: IfNotPresent
        ipam:
          mode: kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
