grafana:
  ingress:
    enabled: false
  # 管理者パスワード（ポートフォリオ用途のため固定値）
  adminPassword: admin
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      url: http://loki.logging.svc.cluster.local:3100
      isDefault: false
      jsonData:
        derivedFields:
          - matcherRegex: "traceID=(\\w+)"
            name: TraceID
            url: "$${__value.raw}"
            datasourceUid: "P214B5B846CF3925F"
    - name: Tempo
      type: tempo
      url: http://tempo.tracing.svc.cluster.local:3200
      isDefault: false
      jsonData:
        httpMethod: GET
prometheus:
  prometheusSpec:
    # すべてのnamespaceのServiceMonitorを検出
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    retention: 7d
    resources:
      requests:
        memory: 512Mi
        cpu: 200m
      limits:
        memory: 1Gi
        cpu: 500m
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: 64Mi
        cpu: 50m
      limits:
        memory: 128Mi
        cpu: 100m
prometheusOperator:
  admissionWebhooks:
    enabled: false
    patch:
      enabled: false
  tls:
    enabled: false
