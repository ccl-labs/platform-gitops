grafana:
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: local-ca-issuer
    hosts:
      - grafana.localhost
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.localhost
  # 管理者パスワード（ポートフォリオ用途のため固定値）
  adminPassword: admin
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.logging.svc.cluster.local:3100
      isDefault: false
    - name: Tempo
      type: tempo
      url: http://tempo.tracing.svc.cluster.local:3200
      isDefault: false
      jsonData:
        httpMethod: GET

prometheus:
  prometheusSpec:
    # すべてのnamespaceのServiceMonitorを検出
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    retention: 7d
    resources:
      requests:
        memory: 512Mi
        cpu: 200m
      limits:
        memory: 1Gi
        cpu: 500m

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: 64Mi
        cpu: 50m
      limits:
        memory: 128Mi
        cpu: 100m
