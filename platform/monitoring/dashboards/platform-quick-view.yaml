apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-platform-quick-view
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  platform-quick-view.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "red", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 3, "x": 0, "y": 0 },
          "id": 4,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "percentChangeColorMode": "standard",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "12.4.3",
          "targets": [
            {
              "editorMode": "code",
              "exemplar": false,
              "expr": "sum(increase(controller_runtime_reconcile_errors_total{namespace=\"external-secrets\"}[1h]))",
              "instant": true,
              "legendFormat": "__auto",
              "range": false,
              "refId": "A"
            }
          ],
          "title": "ESO Sync Errors",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "custom": {
                "align": "auto",
                "cellOptions": { "type": "auto" },
                "footer": { "reducers": [] },
                "inspect": false
              },
              "decimals": 0,
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "red", "value": 80 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 21, "x": 3, "y": 0 },
          "id": 3,
          "options": {
            "cellHeight": "sm",
            "showHeader": true,
            "sortBy": [{ "desc": false, "displayName": "Time" }]
          },
          "pluginVersion": "12.4.3",
          "targets": [
            {
              "editorMode": "code",
              "exemplar": false,
              "expr": "(certmanager_certificate_expiration_timestamp_seconds - time()) / 86400",
              "instant": true,
              "legendFormat": "Days Until Expiry",
              "range": false,
              "refId": "A"
            }
          ],
          "title": "Certificate Expiry (days)",
          "transformations": [
            {
              "id": "labelsToFields",
              "options": {
                "keepLabels": [
                  "exported_namespace",
                  "issuer_kind",
                  "issuer_name",
                  "name",
                  "namespace"
                ]
              }
            },
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": { "Time": true },
                "includeByName": {},
                "indexByName": {
                  "namespace": 0,
                  "exported_namespace": 1,
                  "name": 2,
                  "issuer_kind": 3,
                  "issuer_name": 4,
                  "Days Until Expiry": 5
                },
                "renameByName": {
                  "Days Until Expiry": "Days Until Expiry"
                }
              }
            }
          ],
          "type": "table"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "custom": {
                "align": "auto",
                "cellOptions": { "type": "auto" },
                "footer": { "reducers": [] },
                "inspect": false
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "red", "value": 80 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "id": 1,
          "options": {
            "cellHeight": "sm",
            "showHeader": true
          },
          "pluginVersion": "12.4.3",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "editorMode": "code",
              "exemplar": false,
              "expr": "kube_deployment_status_replicas_unavailable > 0\n  unless on(namespace)\n  kube_namespace_labels{label_policy_enforced=\"true\"}",
              "instant": true,
              "legendFormat": "__auto",
              "range": false,
              "refId": "A"
            }
          ],
          "title": "Unhealthy Deployments",
          "type": "table"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "custom": {
                "align": "auto",
                "cellOptions": { "type": "auto" },
                "footer": { "reducers": [] },
                "inspect": false
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "red", "value": 80 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "id": 2,
          "options": {
            "cellHeight": "sm",
            "showHeader": true
          },
          "pluginVersion": "12.4.3",
          "targets": [
            {
              "editorMode": "code",
              "exemplar": false,
              "expr": "argocd_app_info{sync_status!=\"Synced\"}\nor\nargocd_app_info{health_status!=\"Healthy\"}",
              "instant": true,
              "legendFormat": "__auto",
              "range": false,
              "refId": "A"
            }
          ],
          "title": "OutOfSync Applications",
          "type": "table"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "custom": {
                "align": "auto",
                "cellOptions": { "type": "color-background" },
                "footer": { "reducers": [] },
                "inspect": false
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "transparent", "value": 0 },
                  { "color": "red", "value": 10 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 16 },
          "id": 5,
          "options": {
            "cellHeight": "sm",
            "showHeader": true
          },
          "pluginVersion": "12.4.3",
          "targets": [
            {
              "editorMode": "code",
              "exemplar": false,
              "expr": "sum by (pod, namespace) (\n    kube_pod_container_status_restarts_total\n    unless on(namespace) kube_namespace_labels{label_policy_enforced=\"true\"}\n  ) > 5",
              "instant": true,
              "legendFormat": "__auto",
              "range": false,
              "refId": "A"
            }
          ],
          "title": "Pod Restart Count（> 5）",
          "transformations": [
            {
              "id": "labelsToFields",
              "options": { "mode": "columns" }
            },
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": { "Time": true },
                "includeByName": {},
                "indexByName": {
                  "namespace": 0,
                  "pod": 1,
                  "Value": 2
                },
                "renameByName": {
                  "Value": "Pod Restart Count"
                }
              }
            }
          ],
          "type": "table"
        }
      ],
      "preload": false,
      "schemaVersion": 42,
      "tags": [],
      "templating": { "list": [] },
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Platform Quick View",
      "uid": "adpwz7r",
      "version": 4,
      "weekStart": ""
    }
