apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: ghcr-pull-secret
spec:
  namespaceSelectors:
    - matchLabels:
        ghcr-pull-secret: enabled
  refreshTime: 1h
  externalSecretSpec:
    refreshInterval: 1h
    secretStoreRef:
      name: kubernetes-store
      kind: ClusterSecretStore
    target:
      name: ghcr-pull-secret
      type: kubernetes.io/dockerconfigjson
      template:
        type: kubernetes.io/dockerconfigjson
        data:
          .dockerconfigjson: |
            {"auths":{"ghcr.io":{"username":"{{ .username }}","password":"{{ .password }}","email":"{{ .email }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
    data:
      - secretKey: username
        remoteRef:
          key: ghcr-pat
          property: username
      - secretKey: password
        remoteRef:
          key: ghcr-pat
          property: password
      - secretKey: email
        remoteRef:
          key: ghcr-pat
          property: email
