apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  annotations:
    policies.kyverno.io/title: リソース制限の必須化
    policies.kyverno.io/description: >-
      policy-enforced: "true" ラベルが付いた namespace の
      すべてのコンテナにCPU・Memoryのlimitsが設定されていることを強制します。
      設定がない場合、ノードのリソースを使い果たすリスクがあります。
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchLabels:
                  policy-enforced: "true"
      validate:
        message: "すべてのコンテナにresources.limitsのcpuとmemoryを設定してください。"
        pattern:
          spec:
            containers:
              - name: "*"
                resources:
                  limits:
                    cpu: "?*"
                    memory: "?*"
