apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: generate-ghcr-pull-secret
  annotations:
    policies.kyverno.io/title: ghcr-pull-secret の自動配布
    policies.kyverno.io/description: >-
      ghcr-pull-secret: enabled ラベルが付いた namespace に
      ghcr.io イメージ取得用 Secret を platform-secrets から clone します。
spec:
  generateExisting: true
  rules:
    - name: generate-ghcr-pull-secret
      match:
        any:
          - resources:
              kinds:
                - Namespace
              selector:
                matchLabels:
                  ghcr-pull-secret: enabled
      generate:
        apiVersion: v1
        kind: Secret
        name: ghcr-pull-secret
        namespace: "{{request.object.metadata.name}}"
        synchronize: true
        clone:
          namespace: platform-secrets
          name: ghcr-pull-secret
